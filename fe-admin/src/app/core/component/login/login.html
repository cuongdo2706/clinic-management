<p-toast></p-toast>
<div class="relative flex items-center justify-center h-screen"
     style="background-image: url('/login-bg.webp'); background-size: cover; background-position: center;">

    <!-- Overlay -->
    <div class="absolute inset-0 bg-black opacity-30"></div>

    <div class="relative z-10 flex items-center justify-center gap-16 w-full max-w-4xl px-8">

        <p-card header="Đăng nhập" [style]="{width:'380px'}">
            <form (ngSubmit)="onLogin()" class="mt-3">
                <div>
                    <p-floatlabel variant="on">
                        <input pInputText id="username" [formField]="loginForm.username" style="width: 100%">
                        <label for="username">Tài khoản</label>
                    </p-floatlabel>
                </div>
                <div class="mt-8">
                    <p-floatlabel variant="on">
                        <p-iconfield>
                            <input pInputText id="password"
                                   [type]="showPassword() ? 'text' : 'password'"
                                   [formField]="loginForm.password"
                                   autocomplete="off"
                                   style="width: 100%"/>
                            <p-inputicon
                                [class]="showPassword() ? 'pi pi-eye-slash' : 'pi pi-eye'"
                                style="cursor: pointer"
                                (click)="showPassword.set(!showPassword())"/>
                        </p-iconfield>
                        <label for="password">Mật khẩu</label>
                    </p-floatlabel>
                </div>
                <div class="mt-4">
                    <p-button label="Đăng nhập" type="submit" class="w-full"/>
                </div>
            </form>
        </p-card>

    </div>
</div>
