<p-card class="save-card">
    <form class="save-form" novalidate>

        <div class="form-grid">

            <!-- Mã thuốc -->
            <div class="field">
                <label class="field-label" for="sf-code">Mã thuốc</label>
                <input pInputText id="sf-code" [formField]="saveForm.code"
                       class="w-full" placeholder="Tự động sinh nếu để trống"/>
            </div>

            <!-- Tên thuốc -->
            <div class="field">
                <label class="field-label" for="sf-name">
                    Tên thuốc <span class="req">*</span>
                </label>
                <input pInputText id="sf-name" [formField]="saveForm.name"
                       class="w-full" placeholder="Nhập tên thuốc"
                       (input)="clearError('name')"
                       [class.ng-invalid]="errors()['name']"/>
                @if (errors()['name']) {
                    <small class="error-text">{{ errors()['name'] }}</small>
                }
            </div>

            <!-- Đơn vị -->
            <div class="field">
                <label class="field-label" for="sf-unit">
                    Đơn vị <span class="req">*</span>
                </label>
                <input pInputText id="sf-unit" [formField]="saveForm.unit"
                       class="w-full" placeholder="VD: Viên, Hộp, Chai..."
                       (input)="clearError('unit')"
                       [class.ng-invalid]="errors()['unit']"/>
                @if (errors()['unit']) {
                    <small class="error-text">{{ errors()['unit'] }}</small>
                }
            </div>

            <!-- Giá -->
            <div class="field">
                <label class="field-label" for="sf-price">
                    Giá (VNĐ) <span class="req">*</span>
                </label>
                <input pInputText type="number" id="sf-price" [formField]="saveForm.price"
                       class="w-full" placeholder="Nhập giá"
                       (input)="clearError('price')"
                       [class.ng-invalid]="errors()['price']"/>
                @if (errors()['price']) {
                    <small class="error-text">{{ errors()['price'] }}</small>
                }
            </div>

            <!-- Số lượng -->
            <div class="field">
                <label class="field-label" for="sf-quantity">
                    Số lượng <span class="req">*</span>
                </label>
                <input pInputText type="number" id="sf-quantity" [formField]="saveForm.quantity"
                       class="w-full" placeholder="Nhập số lượng"
                       (input)="clearError('quantity')"
                       [class.ng-invalid]="errors()['quantity']"/>
                @if (errors()['quantity']) {
                    <small class="error-text">{{ errors()['quantity'] }}</small>
                }
            </div>

            <!-- Nhà sản xuất -->
            <div class="field">
                <label class="field-label" for="sf-manufacturer">Nhà sản xuất</label>
                <input pInputText id="sf-manufacturer" [formField]="saveForm.manufacturer"
                       class="w-full" placeholder="Nhập nhà sản xuất"/>
            </div>

            <!-- Xuất xứ -->
            <div class="field">
                <label class="field-label" for="sf-origin">Xuất xứ</label>
                <input pInputText id="sf-origin" [formField]="saveForm.origin"
                       class="w-full" placeholder="VD: Việt Nam, Hàn Quốc..."/>
            </div>

            <!-- Mô tả -->
            <div class="field span-full">
                <label class="field-label" for="sf-desc">Mô tả</label>
                <textarea id="sf-desc" [formField]="saveForm.description"
                          class="p-textarea-match w-full" placeholder="Nhập mô tả thuốc"
                          rows="3"></textarea>
            </div>

        </div>

        <div class="form-actions">
            <p-button type="button" label="Hủy" severity="secondary" icon="pi pi-times"
                      (onClick)="cancelled.emit()" [disabled]="loading()"/>
            <p-button type="button" label="Lưu thuốc"
                      severity="success" icon="pi pi-check"
                      (onClick)="onSubmit()"
                      [loading]="loading()"/>
        </div>

    </form>
</p-card>
