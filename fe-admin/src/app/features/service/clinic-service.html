<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="page-header">
    <h2>Quản lý dịch vụ</h2>
</div>

<p-toolbar>
    <ng-template #start>
        <p-button label="Thêm mới" icon="pi pi-plus" severity="success" (onClick)="openNew()"></p-button>
    </ng-template>
    <ng-template #end>
        <p-iconfield>
            <p-inputicon class="pi pi-search"></p-inputicon>
            <input pInputText placeholder="Tìm kiếm..." [(ngModel)]="searchKeyword" (keyup.enter)="onSearch()"/>
        </p-iconfield>
    </ng-template>
</p-toolbar>

<p-table [value]="services()" [loading]="loading()" [paginator]="true" [rows]="10"
         [rowsPerPageOptions]="[5, 10, 20]" [showCurrentPageReport]="true"
         currentPageReportTemplate="Hiển thị {first} - {last} / {totalRecords} dịch vụ"
         styleClass="mt-4">
    <ng-template #header>
        <tr>
            <th>Tên dịch vụ</th>
            <th>Mô tả</th>
            <th>Giá (VNĐ)</th>
            <th>Thời gian (phút)</th>
            <th>Trạng thái</th>
            <th style="width: 150px">Thao tác</th>
        </tr>
    </ng-template>
    <ng-template #body let-svc>
        <tr>
            <td>{{ svc.name }}</td>
            <td>{{ svc.description }}</td>
            <td>{{ svc.price | currency:'VND':'symbol':'1.0-0' }}</td>
            <td>{{ svc.duration }} phút</td>
            <td>
                <p-tag [value]="svc.active ? 'Hoạt động' : 'Ngưng'"
                       [severity]="svc.active ? 'success' : 'danger'"></p-tag>
            </td>
            <td>
                <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="info"
                          (onClick)="openEdit(svc)"></p-button>
                <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger"
                          (onClick)="confirmDelete(svc)"></p-button>
            </td>
        </tr>
    </ng-template>
    <ng-template #emptymessage>
        <tr>
            <td colspan="6" class="text-center p-4">Không có dữ liệu</td>
        </tr>
    </ng-template>
</p-table>

<!-- Dialog thêm/sửa -->
<p-dialog [header]="isEdit() ? 'Cập nhật dịch vụ' : 'Thêm dịch vụ mới'" [(visible)]="dialogVisible"
          [style]="{width: '480px'}" [modal]="true">
    <div class="flex flex-col gap-6 mt-4">
        <p-floatlabel variant="on">
            <input pInputText id="name" [(ngModel)]="formData.name" style="width: 100%"/>
            <label for="name">Tên dịch vụ</label>
        </p-floatlabel>

        <p-floatlabel variant="on">
            <textarea pTextarea id="description" [(ngModel)]="formData.description" rows="3"
                      style="width: 100%"></textarea>
            <label for="description">Mô tả</label>
        </p-floatlabel>

        <p-floatlabel variant="on">
            <p-inputnumber id="price" [(ngModel)]="formData.price" mode="currency" currency="VND" locale="vi-VN"
                           [style]="{width: '100%'}"></p-inputnumber>
            <label for="price">Giá</label>
        </p-floatlabel>

        <p-floatlabel variant="on">
            <p-inputnumber id="duration" [(ngModel)]="formData.duration" suffix=" phút"
                           [style]="{width: '100%'}"></p-inputnumber>
            <label for="duration">Thời gian</label>
        </p-floatlabel>
    </div>

    <ng-template #footer>
        <p-button label="Huỷ" icon="pi pi-times" [text]="true" severity="secondary"
                  (onClick)="dialogVisible.set(false)"></p-button>
        <p-button label="Lưu" icon="pi pi-check" severity="success" (onClick)="save()"></p-button>
    </ng-template>
</p-dialog>
