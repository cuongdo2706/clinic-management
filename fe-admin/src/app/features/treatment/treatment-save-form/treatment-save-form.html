<p-card class="save-card">
    <form class="save-form" novalidate>
        <div class="form-grid">

            <!-- Mã dịch vụ -->
            <div class="field">
                <label class="field-label" for="sf-code">Mã dịch vụ</label>
                <input pInputText id="sf-code" [formField]="saveForm.code"
                       class="w-full" placeholder="Tự động sinh nếu để trống"/>
            </div>

            <!-- Tên dịch vụ -->
            <div class="field">
                <label class="field-label" for="sf-name">Tên dịch vụ <span class="req">*</span></label>
                <input pInputText id="sf-name" [formField]="saveForm.name"
                       class="w-full" placeholder="Nhập tên dịch vụ"
                       (input)="clearError('name')"
                       [class.ng-invalid]="errors()['name']"/>
                @if (errors()['name']) {
                    <small class="error-text">{{ errors()['name'] }}</small>
                }
            </div>

            <!-- Giá -->
            <div class="field">
                <label class="field-label" for="sf-price">Giá (VNĐ) <span class="req">*</span></label>
                <input pInputText id="sf-price" [formField]="saveForm.price" type="number"
                       class="w-full" placeholder="Nhập giá dịch vụ"
                       (input)="clearError('price')"
                       [class.ng-invalid]="errors()['price']"/>
                @if (errors()['price']) {
                    <small class="error-text">{{ errors()['price'] }}</small>
                }
            </div>

            <!-- Đơn vị -->
            <div class="field">
                <label class="field-label" for="sf-unit">Đơn vị</label>
                <input pInputText id="sf-unit" [formField]="saveForm.unit"
                       class="w-full" placeholder="VD: Lần, Buổi..."/>
            </div>

            <!-- Danh mục -->
            <div class="field">
                <label class="field-label" for="sf-category">Danh mục</label>
                <select id="sf-category" [formField]="saveForm.treatmentCategoryId" class="p-select-match w-full">
                    <option value="">-- Chọn danh mục --</option>
                    @for (cat of categories(); track cat.id) {
                        <option [value]="cat.id">{{ cat.name }}</option>
                    }
                </select>
            </div>

            <!-- Trạng thái -->
            <div class="field">
                <label class="field-label" for="sf-active">Trạng thái</label>
                <select id="sf-active" [formField]="saveForm.isActive" class="p-select-match w-full">
                    <option value="true">Hoạt động</option>
                    <option value="false">Ngừng hoạt động</option>
                </select>
            </div>

            <!-- Mô tả -->
            <div class="field span-full">
                <label class="field-label" for="sf-desc">Mô tả</label>
                <textarea id="sf-desc" [formField]="saveForm.description"
                          class="p-textarea-match w-full" placeholder="Nhập mô tả dịch vụ"
                          rows="3"></textarea>
            </div>

        </div>

        <div class="form-actions">
            <p-button type="button" label="Hủy" severity="secondary" icon="pi pi-times"
                      (onClick)="cancelled.emit()" [disabled]="loading()"/>
            <p-button type="button" label="Lưu dịch vụ"
                      severity="success" icon="pi pi-check"
                      (onClick)="onSubmit()"
                      [loading]="loading()"/>
        </div>
    </form>
</p-card>
