<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="page-header">
    <h2>Quản lý bệnh nhân</h2>
</div>

<p-toolbar>
    <ng-template #start>
        <p-button label="Thêm mới" icon="pi pi-plus" severity="success" (onClick)="openNew()"></p-button>
    </ng-template>
    <ng-template #end>
        <p-iconfield>
            <p-inputicon class="pi pi-search"></p-inputicon>
            <input pInputText placeholder="Tìm kiếm..." [(ngModel)]="searchKeyword" (keyup.enter)="onSearch()"/>
        </p-iconfield>
    </ng-template>
</p-toolbar>

<p-table [value]="patients()" [loading]="loading()" [paginator]="true" [rows]="10"
         [rowsPerPageOptions]="[5, 10, 20]" [showCurrentPageReport]="true"
         currentPageReportTemplate="Hiển thị {first} - {last} / {totalRecords} bệnh nhân"
         styleClass="mt-4">
    <ng-template #header>
        <tr>
            <th>Họ tên</th>
            <th>SĐT</th>
            <th>Email</th>
            <th>Ngày sinh</th>
            <th>Giới tính</th>
            <th>Địa chỉ</th>
            <th style="width: 150px">Thao tác</th>
        </tr>
    </ng-template>
    <ng-template #body let-patient>
        <tr>
            <td>{{ patient.fullName }}</td>
            <td>{{ patient.phone }}</td>
            <td>{{ patient.email }}</td>
            <td>{{ patient.dateOfBirth }}</td>
            <td>{{ getGenderLabel(patient.gender) }}</td>
            <td>{{ patient.address }}</td>
            <td>
                <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="info"
                          (onClick)="openEdit(patient)"></p-button>
                <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger"
                          (onClick)="confirmDelete(patient)"></p-button>
            </td>
        </tr>
    </ng-template>
    <ng-template #emptymessage>
        <tr>
            <td colspan="7" class="text-center p-4">Không có dữ liệu</td>
        </tr>
    </ng-template>
</p-table>

<!-- Dialog thêm/sửa -->
<p-dialog [header]="isEdit() ? 'Cập nhật bệnh nhân' : 'Thêm bệnh nhân mới'" [(visible)]="dialogVisible"
          [style]="{width: '480px'}" [modal]="true">
    <div class="flex flex-col gap-6 mt-4">
        <p-floatlabel variant="on">
            <input pInputText id="fullName" [(ngModel)]="formData.fullName" style="width: 100%"/>
            <label for="fullName">Họ tên</label>
        </p-floatlabel>

        <p-floatlabel variant="on">
            <input pInputText id="phone" [(ngModel)]="formData.phone" style="width: 100%"/>
            <label for="phone">Số điện thoại</label>
        </p-floatlabel>

        <p-floatlabel variant="on">
            <input pInputText id="email" [(ngModel)]="formData.email" style="width: 100%"/>
            <label for="email">Email</label>
        </p-floatlabel>

        <p-floatlabel variant="on">
            <input pInputText id="dob" [(ngModel)]="formData.dateOfBirth" type="date" style="width: 100%"/>
            <label for="dob">Ngày sinh</label>
        </p-floatlabel>

        <p-floatlabel variant="on">
            <p-select id="gender" [(ngModel)]="formData.gender" [options]="genderOptions"
                      optionLabel="label" optionValue="value" [style]="{width: '100%'}"></p-select>
            <label for="gender">Giới tính</label>
        </p-floatlabel>

        <p-floatlabel variant="on">
            <input pInputText id="address" [(ngModel)]="formData.address" style="width: 100%"/>
            <label for="address">Địa chỉ</label>
        </p-floatlabel>
    </div>

    <ng-template #footer>
        <p-button label="Huỷ" icon="pi pi-times" [text]="true" severity="secondary"
                  (onClick)="dialogVisible.set(false)"></p-button>
        <p-button label="Lưu" icon="pi pi-check" severity="success" (onClick)="save()"></p-button>
    </ng-template>
</p-dialog>
