<p-card class="save-card">
    <form [formGroup]="saveForm" class="save-form" novalidate>
        <div class="form-grid">

<!-- Mã dịch vụ -->
            <div class="field">
        <label class="field-label" for="sf-code">Mã dịch vụ</label>
                <input pInputText id="sf-code" formControlName="code"
                       class="w-full" placeholder="Tự động sinh nếu để trống"/>
            </div>

<!-- Tên dịch vụ -->
            <div class="field">
        <label class="field-label" for="sf-name">Tên dịch vụ <span class="req">*</span></label>
                <input pInputText id="sf-name" formControlName="name"
               class="w-full" placeholder="Nhập tên dịch vụ"
                       (input)="clearError('name')"
                       [class.ng-invalid]="errors()['name']"/>
                @if (errors()['name']) {
                    <small class="error-text">{{ errors()['name'] }}</small>
                }
            </div>

            <!-- Giá -->
            <div class="field">
                <label class="field-label" for="sf-price">Giá (VNĐ) <span class="req">*</span></label>
                <input pInputText id="sf-price" formControlName="price" type="number"
               class="w-full" placeholder="Nhập giá dịch vụ"
                       (input)="clearError('price')"
                       [class.ng-invalid]="errors()['price']"/>
                @if (errors()['price']) {
                    <small class="error-text">{{ errors()['price'] }}</small>
                }
            </div>

            <!-- Đơn vị -->
            <div class="field">
                <label class="field-label" for="sf-unit">Đơn vị</label>
                <input pInputText id="sf-unit" formControlName="unit"
                       class="w-full" placeholder="VD: Lần, Buổi..."/>
            </div>

            <div class="field">
                <label class="field-label" for="sf-duration">Thời lượng (phút)</label>
                <input pInputText id="sf-duration" formControlName="durationMinutes" type="number"
                       class="w-full" placeholder="VD: 30"
                       (input)="clearError('durationMinutes')"
                       [class.ng-invalid]="errors()['durationMinutes']"/>
                @if (errors()['durationMinutes']) {
                    <small class="error-text">{{ errors()['durationMinutes'] }}</small>
                }
            </div>

            <!-- Danh mục -->
            <div class="field">
                <label class="field-label" for="sf-category">Danh mục</label>
                <p-select id="sf-category" formControlName="procedureCategoryId"
                          class="w-full"
                          [options]="categories()"
                          optionLabel="name"
                          optionValue="id"
                          [placeholder]="'-- Chọn danh mục --'"></p-select>
            </div>

            <!-- Trạng thái -->
            <div class="field">
                <label class="field-label" for="sf-active">Trạng thái</label>
                <p-select id="sf-active" formControlName="isActive"
                          class="w-full"
                          [options]="activeOptions"
                          optionLabel="label"
                          optionValue="value"></p-select>
            </div>

            <!-- Mô tả -->
            <div class="field span-full">
                <label class="field-label" for="sf-desc">Mô tả</label>
                <textarea pTextarea id="sf-desc" formControlName="description"
                    class="w-full" placeholder="Nhập mô tả dịch vụ"
                          rows="3"></textarea>
            </div>

        </div>

        <div class="form-actions">
            <p-button type="button" label="Hủy" severity="secondary" icon="pi pi-times"
                      (onClick)="cancelled.emit()" [disabled]="loading()"/>
        <p-button type="button" label="Lưu dịch vụ"
                      severity="success" icon="pi pi-check"
                      (onClick)="onSubmit()"
                      [loading]="loading()"/>
        </div>
    </form>
</p-card>
